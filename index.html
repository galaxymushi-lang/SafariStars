<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>Safari Stars English</title>
  <meta name="theme-color" content="#58CC02" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="stylesheet" href="styles.css?v=6.0.0" />
</head>
<body>

<div class="notif-toast" id="notifToast" style="display:none">
  <span class="nt-icon" id="notifIcon">🔔</span>
  <span class="nt-text" id="notifText"></span>
  <button class="nt-close" id="notifClose">&times;</button>
</div>

<section class="auth" id="authScreen">
  <div class="auth-card">
    <div class="auth-avatar"><div class="avatar-circle orange">SS</div></div>
    <h1>Safari Stars</h1>
    <p class="auth-sub">Learn English, the fun way</p>
    <form id="loginForm">
      <input id="loginName" type="text" placeholder="Your name" required minlength="2" />
      <select id="loginRole"><option value="child">Student</option><option value="parent">Parent</option><option value="teacher">Teacher</option></select>
      <button type="submit" class="btn btn-green btn-block">Get Started</button>
    </form>
    <div class="saved-users" id="savedUsers"></div>
    <p class="auth-credit">Developed by <strong>E.J. MUSHI</strong></p>
  </div>
</section>

<div class="app" id="appShell">
  <header class="hdr">
    <div class="hdr-left"><div class="avatar-circle sm orange">SS</div><span class="hdr-title">Safari Stars</span></div>
    <div class="hdr-pills">
      <span class="pill fire"><i class="i-fire"></i><b id="streakDisplay">0</b></span>
      <span class="pill heart"><i class="i-heart"></i><b id="heartsDisplay">5</b></span>
      <span class="pill xp"><i class="i-star"></i><b id="xpDisplay">0</b></span>
    </div>
    <button class="hdr-btn" id="settingsBtn"><i class="i-gear"></i></button>
  </header>

  <main class="main" id="mainArea"></main>
</div>

<div class="toasts" id="toastWrap"></div>

<script src="lessons.js?v=6.0.0"></script>
<script src="app.js?v=6.0.0"></script>
</body>
</html>
